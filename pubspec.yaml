name: notenest
description: "A production-quality offline note management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2
  pdf: ^3.10.8
  printing: ^5.11.1
  syncfusion_flutter_pdfviewer: ^27.1.53
  syncfusion_flutter_pdf: ^27.1.53
  share_plus: ^9.0.0
  uuid: ^4.4.0
  google_mlkit_text_recognition: ^0.13.0
  http: ^1.2.1
  google_generative_ai: ^0.4.6 # Upgraded from 0.4.0 to 0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
